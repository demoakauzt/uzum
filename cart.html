<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamonaviy Savatcha - Uzum Market</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #004532;
            --accent: #4ade80;
            --bg: #f0f4f8;
            --card-bg: rgba(255, 255, 255, 0.85);
        }
        body { 
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            font-family: 'Outfit', sans-serif;
            color: #102a43;
            min-height: 100vh;
        }
        .cart-page { 
            max-width: 1100px; 
            margin: 60px auto; 
            padding: 0 25px; 
        }
        
        .cart-header { 
            text-align: center;
            margin-bottom: 50px;
        }
        .cart-title { 
            font-size: 3rem; 
            font-weight: 700;
            background: linear-gradient(to right, #004532, #102a43);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .back-link {
            color: #627d98;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-link:hover { color: var(--primary); }

        .cart-grid { 
            display: grid; 
            grid-template-columns: 1.5fr 1fr; 
            gap: 40px; 
            align-items: start;
        }
        
        /* Glassmorphism Item List */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            padding: 40px;
        }

        .cart-item { 
            display: flex; 
            align-items: center; 
            gap: 25px; 
            padding: 25px 0; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .cart-item:hover { transform: translateX(10px); }
        .cart-item:last-child { border-bottom: none; }
        
        .img-container {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .cart-item-img { width: 100%; height: 100%; object-fit: cover; }
        
        .cart-item-info { flex: 1; }
        .cart-item-name { font-weight: 600; font-size: 1.3rem; margin-bottom: 8px; color: #102a43; }
        .cart-item-price { color: var(--primary); font-weight: 700; font-size: 1.4rem; }
        
        .remove-btn { 
            background: #fff0f0;
            color: #ff4757; 
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }
        .remove-btn:hover { background: #ff4757; color: white; transform: rotate(90deg); }

        /* Summary Sidebar */
        .summary-card {
            background: #004532;
            color: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 69, 50, 0.2);
            position: sticky;
            top: 40px;
        }
        .summary-title { font-size: 1.6rem; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        
        .row { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 1.1rem; opacity: 0.8; }
        .total-row { 
            margin-top: 30px; 
            padding-top: 25px; 
            border-top: 2px solid rgba(255,255,255,0.1); 
            font-size: 1.8rem; 
            font-weight: 700; 
            opacity: 1;
        }

        .checkout-form { margin-top: 40px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.7; }
        .input-group input { 
            width: 100%; 
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .input-group input:focus { background: rgba(255,255,255,0.2); border-color: var(--accent); outline: none; }
        
        .buy-btn { 
            width: 100%; 
            padding: 20px; 
            background: var(--accent); 
            color: var(--primary);
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.2);
        }
        .buy-btn:hover { background: #3ccb6c; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(74, 222, 128, 0.4); }

        .empty-state { text-align: center; padding: 100px 0; }
        .empty-state i { font-size: 6rem; color: #bcccdc; margin-bottom: 30px; }
        
        @media (max-width: 900px) {
            .cart-grid { grid-template-columns: 1fr; }
            .summary-card { position: static; }
        }
    </style>
</head>
<body>

    <div class="cart-page">
        <div class="cart-header">
            <h1 class="cart-title">Tanlangan mahsulotlar</h1>
            <a href="products.html" class="back-link"><i class="fas fa-arrow-left"></i> Xaridni davom ettirish</a>
        </div>

        <div id="cartDisplay">
            <!-- Loading dynamic content -->
        </div>
    </div>

    <script>
        function renderCart() {
            const display = document.getElementById('cartDisplay');
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');

            if (cart.length === 0) {
                display.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-bag"></i>
                        <h2>Savatchangiz bo'sh</h2>
                        <p>Keling, uni ajoyib mahsulotlar bilan to'ldiramiz!</p>
                        <a href="products.html" class="buy-btn" style="display:inline-block; width:auto; padding: 15px 40px; margin-top: 20px; text-decoration:none;">Xaridni boshlash</a>
                    </div>
                `;
                return;
            }

            let listHtml = '';
            let subtotal = 0;

            cart.forEach((item, i) => {
                const numericPrice = parseInt(item.price.replace(/[^\d]/g, '')) || 0;
                subtotal += numericPrice;

                listHtml += `
                    <div class="cart-item">
                        <div class="img-container">
                            <img src="${item.image}" class="cart-item-img">
                        </div>
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price}</div>
                        </div>
                        <button class="remove-btn" onclick="del(${i})">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
            });

            display.innerHTML = `
                <div class="cart-grid">
                    <div class="glass-card">
                        ${listHtml}
                    </div>
                    <div class="summary-card">
                        <h3 class="summary-title">Jami hisob</h3>
                        <div class="row">
                            <span>Soni:</span>
                            <span>${cart.length} ta</span>
                        </div>
                        <div class="row">
                            <span>Yetkazib berish:</span>
                            <span style="color:var(--accent)">BEPUL</span>
                        </div>
                        <div class="total-row">
                            <span>Jami:</span>
                            <span>${subtotal.toLocaleString()} so'm</span>
                        </div>

                        <div class="checkout-form">
                            <div class="input-group">
                                <label>Ismingiz</label>
                                <input type="text" id="cName" placeholder="Alisher">
                            </div>
                            <div class="input-group">
                                <label>Telefon raqamingiz</label>
                                <input type="tel" id="cPhone" placeholder="+998 9x xxx xx xx">
                            </div>
                            <div class="input-group">
                                <label>Manzil</label>
                                <input type="text" id="cAddr" placeholder="Shahar, tuman, ko'cha...">
                            </div>
                            <button class="buy-btn" onclick="confirmOrder()">BUYURTMA BERISH</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function del(i) {
            let c = JSON.parse(localStorage.getItem('cart') || '[]');
            c.splice(i, 1);
            localStorage.setItem('cart', JSON.stringify(c));
            renderCart();
        }

        function confirmOrder() {
            const n = document.getElementById('cName').value;
            const p = document.getElementById('cPhone').value;
            const a = document.getElementById('cAddr').value;

            if(!n || !p || !a) {
                alert('Iltimos, barcha ma\'lumotlarni kiriting!');
                return;
            }

            alert('Muvaffaqiyatli! Operatorimiz tez orada bog\'lanadi.');
            localStorage.removeItem('cart');
            window.location.href = 'index.html';
        }

        window.onload = renderCart;
    </script>
</body>
</html>
